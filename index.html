<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>FORM PENDAFTARAN</h1>

    <!--Form-->
    <form action="">

        <!--Nama lengkap-->
        <label>Nama lengkap:</label><br>
        <input type="text" name="nama" /><br><br>

        <!--Email-->
        <label>Email:</label><br>
        <input type="email" name="email" /><br><br>

        <!--Password-->
        <label>Password:</label><br>
        <input type="password" name="password" /><br><br>

        <!--Jenis kelamin-->
        <label>Jenis Kelamin</label><br>
        <input type="radio" name="jk" value="Pria">Pria
        <input type="radio" name="jk" value="Wanita">Wanita <br><br>

        <!--Hobi-hobi-->
        <label>Hobi</label><br>
        <input type="checkbox" name="hobi" value="Olahraga">Olahraga
        <input type="checkbox" name="hobi" value="Seni">Seni
        <input type="checkbox" name="hobi" value="Sains">Sains
        <input type="checkbox" name="hobi" value="Bahasa">Bahasa <br><br>

        <!--Kota-->
        <label>Pilih Kota</label>
        <select name="kota">
            <option>Pilih kota</option>
            <option>Lampung</option>
            <option>Banyumas</option>
            <option>Aceh</option>
            <option>Bandung</option>
            <option>Semarang</option>
            <option>Purbalingga</option>
        </select><br><br>

        <!--Kotak pesan-->
        <label>Pesan</label><br>
        <textarea cols="30" rows="5"></textarea><br><br>

        <!--Tombol-tombol-->
        <input type="submit" value="Daftar">
        <input type="reset" value="Reset">
    </form>
</body>
</html>
